name: 🗺 Publish Charts

on:
  push:
    branches:
    - main
    paths:
    - charts/**/Chart.yaml

concurrency:
  group: publish-pages

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - name: 📰 Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 🛠 Configure Git
      run: |
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

    - name: 🕊 Release Chart
      uses: helm/chart-releaser-action@v1
      env:
        CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
