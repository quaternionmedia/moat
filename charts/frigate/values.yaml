app-template:
  controllers:
    go2rtc:
      suffix: go2rtc
      containers:
        main:
          image:
            repository: alexxit/go2rtc
            tag: latest
  service:
    go2rtc:
      suffix: go2rtc
      controller: go2rtc
      ports:
        rtmp: 
          port: 1935
        rtsp:
          port: 8554
        webrtc:
          port: 8555
        api:
          port: 1984
  configMaps:
    go2rtc-config:
      suffix: go2rtc
      data:
        go2rtc.yaml: |
          webrtc:
            listen: :8555
          api:
            listen: :1984
          rtmp:
            enabled: true
            listen: :1935
          rtsp:
            listen: :8554

          streams:
            HOffice: null
            Laboratory: null
  persistence:
    config:
      enabled: true
      type: configMap
      identifier: go2rtc-config
  ingress:
    rtmp:
      suffix: rtmp
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
      hosts:
      - host: rtmp.harpo.me
        paths:
        - path: /
          service:
            identifier: go2rtc
            port: rtmp
      tls:
      - secretName: go2rtc-tls
        hosts:
        - rtmp.harpo.me
     
frigate:
  image:
    repository: ghcr.io/blakeblackshear/frigate
    tag: 0.17.0
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
    hosts:
    - host: video.harpo.me
      paths:
      - path: /
        portName: http
    tls:
    - secretName: frigate-tls-production
      hosts:
      - video.harpo.me
  persistence:
    media:
      enabled: true
      size: 128Gi
  config: |
    mqtt:
      enabled: false

    record:
      enabled: true
      motion:
        days: 3
      alerts:
        days: 10
        mode: motion
      detections:
        retain:
          days: 30
          mode: motion
      # export:
      #   timelapse_args: "-vf setpts=PTS/60"

    timestamp_style:
      format: '%Y-%m-%d %H:%M:%S %Z'
      position: br

    snapshots:
      enabled: true
      retain:
        default: 10

    audio:
      enabled: true
      max_not_heard: 30
      min_volume: 500
      listen:
      - bark
      - fire_alarm
      - scream
      - speech
      - yell
      filters:
        speech:
          threshold: 0.8

    cameras:
      moat-front:
        enabled: true
        audio:
          enabled: true
        ffmpeg:
          input_args: preset-rtsp-generic
        onvif:
          host: 10.11.0.153
          port: 80
          user: frigate
          password: frigate

      Moat-Back:
        enabled: true
        audio:
          enabled: true
        ffmpeg:
          input_args: preset-rtsp-generic
          hwaccel_args: []
          inputs:
          - path: rtsp://frigate-go2rtc/Moat-Back
            roles:
            - detect
            - record
            - audio
      Moat-Driveway:
        enabled: true
        audio:
          enabled: true
        ffmpeg:
          input_args: preset-rtsp-generic
          hwaccel_args: []
          inputs:
          - path: rtsp://frigate-go2rtc/Moat-Driveway
            roles:
            - detect
            - record
            - audio
      Moat-Fence:
        enabled: true
        audio:
          enabled: true
        ffmpeg:
          input_args: preset-rtsp-generic
          hwaccel_args: []
          inputs:
          - path: rtsp://frigate-go2rtc/Moat-Fence
            roles:
            - detect
            - record
            - audio
      HOffice:
        enabled: true
        audio:
          enabled: true
        ffmpeg:
          input_args: preset-rtmp-generic
          inputs:
          - path: rtmp://frigate-go2rtc/HOffice
            roles:
            - audio
            - detect
            - record

        detect:
          enabled: true
        # zones:
        #   - name: "HOffice"

      Laboratory:
        enabled: true
        audio:
          enabled: true
        ffmpeg:
          input_args: preset-rtsp-generic
          hwaccel_args: []
          inputs:
          - path: rtsp://frigate-go2rtc/Laboratory
            roles:
            - detect
            - record
            - audio

        detect:
          enabled: true

    detect:
      enabled: true
      width: 640
      height: 480
      fps: 5

    motion:
      enabled: true

    objects:
      track:
      - person
      - cat
      - dog
      - bird
      - car
      - cell phone
      - eye glasses
      - wine glass
      - cup
      - chair
      - knife
      - fork
      - spoon
      - scissors
      - bowl
      - book

    review:
      alerts:
        labels:
        - person
      detections:
        labels:
        - person
        - car
        - cat
        - dog
        - hat
        - eye glasses
        - cell phone
        - cup
        - chair
        - desk
        - window
        - book
        - scissors

    ui:
      timezone: America/Los_Angeles
    camera_groups:
      Garage:
        order: 1
        icon: LuWarehouse
        cameras: Laboratory
      Inside:
        order: 2
        icon: LuHome
        cameras: HOffice
